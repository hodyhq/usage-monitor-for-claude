<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="popup.css">
</head>
<body>

    </svg>
    <span id="title"></span>
    <span id="planChip" class="chip"></span>
    <button type="button" id="closeBtn" aria-label="Close">&times;</button>
</header>

<section id="accountSection" class="card">
    <h2 id="headingAccount"></h2>
    <dl>
        <div id="emailRow">
            <dt id="labelEmail"></dt>
            <dd id="emailValue"></dd>
        </div>
        <div id="planRow">
            <dt id="labelPlan"></dt>
            <dd id="planValue"></dd>
        </div>
    </dl>
</section>

<section id="usageSection">
    <div id="usageRings"></div>
</section>

<section id="modelSection" class="card">
    <h2 id="headingByModel"></h2>
    <div id="modelBars"></div>
</section>

<section id="extraSection" class="card">
    <h2 id="headingExtraUsage"></h2>
    <div class="bar-header">
        <span id="extraSpent"></span>
        <span id="extraPct"></span>
    </div>
    <div class="bar-container">
        <div class="bar-fill" id="extraFill"></div>
    </div>
</section>

<section id="tokensSection" class="card">
    <div class="heading-row">
        <h2 id="headingTokens"></h2>
        <span id="tokensNote" class="heading-note"></span>
    </div>
    <dl id="tokenRows"></dl>
</section>

<section id="installSection" class="card">
    <div class="heading-row">
        <h2 id="headingClaudeCode"></h2>
        <span id="changelogLink"></span>
    </div>
    <dl id="installRows"></dl>
</section>

<footer id="statusSection">
    <span id="statusText"></span>
    <span id="appVersion"></span>
</footer>

<script src="popup.js"></script>
</body>
</html>
